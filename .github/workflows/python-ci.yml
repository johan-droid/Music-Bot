name: Python CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        pip install -r requirements.txt
    
    - name: Lint with flake8
      run: |
        flake8 bot --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 bot --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Test imports
      env:
        API_ID: 123456
        API_HASH: test_hash_for_ci
        BOT_TOKEN: 123456:ABC-DEF1234ghIkl-zyx57W2v1u123ew11
        OWNER_ID: 123456789
        SESSION_STRING_1: test_session_string_for_ci_only_not_real
      run: |
        python -c "from config import config; print('Config loaded successfully')"
        python -c "from bot.utils.audio_config import get_audio_optimizer; print('Audio config loaded successfully')"
        python -c "from bot.utils.title_detector import conflict_resolver; print('Title detector loaded successfully')"
