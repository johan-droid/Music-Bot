version: "3.8"

services:
  bot:
    build: .
    container_name: musicbot
    restart: unless-stopped
    # Uncomment below if using MongoDB and Redis
    # depends_on:
    #   - mongo
    #   - redis
    env_file:
      - .env
    volumes:
      - ./logs:/var/log/musicbot
      - ./data:/app/data
      - ./cookies.txt:/app/cookies.txt:ro
    # For zero-cost: No external services needed
    # SQLite cache and data stored in ./data
    networks:
      - musicbot-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # MongoDB - Optional (can use SQLite instead by not setting MONGO_URI)
  # Uncomment if you want MongoDB instead of SQLite
  # mongo:
  #   image: mongo:7.0
  #   container_name: musicbot-mongo
  #   restart: unless-stopped
  #   volumes:
  #     - mongo-data:/data/db
  #   environment:
  #     MONGO_INITDB_DATABASE: musicbot
  #   networks:
  #     - musicbot-network

  # Redis - Optional (falls back to SQLite cache if not available)
  # Uncomment if you want Redis instead of SQLite cache
  # redis:
  #   image: redis:7-alpine
  #   container_name: musicbot-redis
  #   restart: unless-stopped
  #   command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
  #   volumes:
  #     - redis-data:/data
  #   networks:
  #     - musicbot-network

volumes:
  mongo-data:
  redis-data:

networks:
  musicbot-network:
    driver: bridge
